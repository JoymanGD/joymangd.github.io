---
layout: default
---

{% assign category = page.categories | first %}

<article class="post-shell">
  <header class="post-header">
    <div class="post-header-text">
      <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
      <h1>{{ page.title }}</h1>
    </div>
  </header>

  <div class="prose">
    {{ content }}
  </div>

  <nav class="post-nav" aria-label="Post navigation">
    <a class="chip-link" href="{{ '/' | relative_url }}">Home</a>
    {% if category %}
      <a class="chip-link" href="{{ '/' | append: category | relative_url }}">{{ category | capitalize }}</a>
    {% endif %}
  </nav>
</article>
